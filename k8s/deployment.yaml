apiVersion: apps/v1
kind: Deployment
metadata:
  name: mock-llm
  labels:
    app: mock-llm
spec:
  replicas: 1
  selector:
    matchLabels:
      app: mock-llm
  template:
    metadata:
      labels:
        app: mock-llm
    spec:
      containers:
        - name: mock-llm
          image: image-registry.openshift-image-registry.svc:5000/mock-llm/mock-llm:latest
          ports:
            - containerPort: 8765
              protocol: TCP
          env:
            - name: MOCK_LLM_LOG_LEVEL
              value: "debug"
            - name: MOCK_LLM_LATENCY_MS
              value: "0"
            - name: MOCK_LLM_STREAM_DELAY_MS
              value: "10"
            - name: MOCK_LLM_WORKERS
              value: "4"
          readinessProbe:
            httpGet:
              path: /v1/models
              port: 8765
            initialDelaySeconds: 2
            periodSeconds: 5
          livenessProbe:
            httpGet:
              path: /v1/models
              port: 8765
            initialDelaySeconds: 5
            periodSeconds: 10
          resources:
            requests:
              cpu: 100m
              memory: 128Mi
            limits:
              cpu: 500m
              memory: 256Mi
---
apiVersion: v1
kind: Service
metadata:
  name: mock-llm
  labels:
    app: mock-llm
spec:
  selector:
    app: mock-llm
  ports:
    - port: 8765
      targetPort: 8765
      protocol: TCP
      name: http
---
apiVersion: route.openshift.io/v1
kind: Route
metadata:
  name: mock-llm
  labels:
    app: mock-llm
spec:
  to:
    kind: Service
    name: mock-llm
  port:
    targetPort: http
  tls:
    termination: edge
